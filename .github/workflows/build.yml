name: Build AirdropPlugin

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: AirdropPlugin
          path: AirdropPlugin/target/AirdropPlugin-1.0.0.jar
